# DATAFLOW 2026 - User Behavior Prediction Configuration

# Paths
paths:
  data_dir: "../data"
  output_dir: "./outputs"
  model_dir: "./outputs/models"
  submission_dir: "./outputs/submissions"
  figures_dir: "./outputs/figures"

# Data Settings
data:
  train_x: "X_train.csv"
  train_y: "Y_train.csv"
  val_x: "X_val.csv"
  val_y: "Y_val.csv"
  test_x: "X_test.csv"
  target_cols:
    - "attr_1"
    - "attr_2"
    - "attr_3"
    - "attr_4"
    - "attr_5"
    - "attr_6"

# Preprocessing
preprocessing:
  # Max actual sequence length in this dataset is 37; no need for 512.
  # Keeping it at 64 gives a small buffer while keeping attention O(n^2) fast.
  max_sequence_length: 64
  padding_strategy: "post"  # pre or post
  truncation_strategy: "pre"  # pre or post (keep recent actions)

# Feature Engineering
features:
  ngram_range: [1, 3]
  # Dense vocab = 254 tokens; histogram already gives lossless bag-of-actions.
  # 2000 TF-IDF features covers the top weighted n-grams; fewer columns = faster XGB/LGB.
  max_features: 2000
  use_tfidf: true
  use_statistics: true
  use_transitions: true
  # Histogram over full 254-action vocab (exact counts per unique action)
  use_histogram: true
  top_k_actions: 100   # top-k for action-frequency and transition features

# Model Settings
models:
  xgboost:
    n_estimators: 400
    max_depth: 6
    learning_rate: 0.05
    subsample: 0.8
    colsample_bytree: 0.8
    early_stopping_rounds: 50
    # GPU acceleration: "cuda" for T1000 (45900×7042×float32≈1.3GB fits in 4.3GB VRAM).
    # NOTE: merge_train_val is never called, so sample count never exceeds 45900.
    device: "cuda"

  lightgbm:
    n_estimators: 400   # early_stopping_rounds=50 caps actual trees; 1000 was unnecessary ceiling
    max_depth: 8
    learning_rate: 0.05
    subsample: 0.8
    colsample_bytree: 0.8
    early_stopping_rounds: 50
    device: "gpu"   # "gpu" or "cpu"

  lstm:
    # Dense vocab = 255 → embedding is 255×128 = tiny, so can afford large hidden
    embedding_dim: 128
    hidden_dim: 512
    num_layers: 3
    dropout: 0.3
    bidirectional: true
    batch_size: 256
    epochs: 100
    learning_rate: 0.001
    patience: 10

  transformer:
    # Scaled-up Transformer — fits on 4 GB VRAM with seq_len=64, batch=256
    d_model: 128
    nhead: 4
    num_layers: 4
    dim_feedforward: 512
    dropout: 0.1
    batch_size: 256
    epochs: 100
    learning_rate: 0.0003
    patience: 20
    warmup_epochs: 3    # linear warmup before cosine decay (was 10, caused undertrained model)

# Training
training:
  seed: 42
  n_folds: 5
  use_gpu: true
  # torch.backends.cudnn.benchmark=True speeds up GPU training for fixed input sizes
  cudnn_benchmark: true

# Evaluation
evaluation:
  primary_metric: "exact_match_accuracy"
  auxiliary_metrics:
    - "per_attribute_accuracy"
    - "macro_f1"
    - "weighted_f1"
